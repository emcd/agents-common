# Copier template validation configuration.
#
# Source-of-truth configuration consumed by copiertv to validate that this
# repository's Copier template renders cleanly for each declared variant.
# CI invokes ``copiertv validate <variant>`` against this file in place of
# the previous in-tree ``agentsmgr-maintain template validate`` implementation.
#
# Variant answer files live at ``tests/data/profiles/answers-*.yaml``. They
# are consumed by:
#   * copiertv, via the ``[answers] directory`` key below (for template
#     rendering validation)
#   * ``agentsmgr-maintain <variant>``, which renders the distribution tree
#     from ``components/`` using the variant answers into an isolated temp
#     directory for variant-specific distribution validation.

[answers]
directory = "tests/data/profiles"

[options]
template-directory = "template"
preserve = false
unsafe = false