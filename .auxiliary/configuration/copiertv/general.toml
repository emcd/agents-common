# Copier template validation configuration.
#
# Source-of-truth configuration consumed by copiertv to validate that this
# repository's Copier template renders cleanly against each variant profile.
# CI invokes ``copiertv validate <variant>`` against this file.
#
# Variant answer files live at ``tests/data/profiles/answers-*.yaml`` and
# are consumed by:
#   * copiertv, via the ``[answers] directory`` key below (for template
#     rendering validation)
#   * ``agentsmgr generate --answers-file PATH --output PATH``, which
#     renders the distribution tree from ``components/`` against the
#     provided answers file and writes to the caller-supplied output
#     directory. CI workflows allocate the output directory via mktemp.

[answers]
directory = "tests/data/profiles"

[options]
template-directory = "template"
preserve = false
unsafe = false
