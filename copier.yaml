_min_copier_version: "9.0"
_answers_file: .auxiliary/configuration/copier-answers--agents.yaml
_subdirectory: template

project_name:
    type: str
    help: Project directory or Git repository name
    validator: >-
        {% if not (project_name | regex_search("^[a-z][a-z0-9-]*$")) %}
        Project name must contain only lowercase letters, numbers, and hyphens
        {% endif %}

project_bundle_name:
    type: str
    help: Coordination bundle name (for shared multi-project workflows)
    default: "{{ project_name }}"
    validator: >-
        {% if not (project_bundle_name | regex_search("^[a-z][a-z0-9-]*$")) %}
        Bundle name must contain only lowercase letters, numbers, and hyphens
        {% endif %}

languages:
    type: str
    help: Programming languages used in this project
    multiselect: true
    choices:
        - python
        - rust
    default:
        - python

coders:
    type: str
    help: AI coding tools to configure
    multiselect: true
    choices:
        - claude
        - codex
        - gemini
        - opencode
        - qwen
    default:
        - claude
        - opencode

support_local_models:
    type: bool
    help: Include support local models.
    default: false

provide_instructions:
    type: bool
    help: Download instructions for AI agents
    default: true

instructions_target:
    type: str
    help: Target directory for instruction files
    default: ".auxiliary/instructions"
    when: "{{ provide_instructions }}"

instructions_sources:
    type: yaml
    help: Git sources for documentation instructions
    default: |
      {%- if "rust" in languages and "python" not in languages %}
      - source: "github:emcd/python-project-common@docs-1#documentation/common"
        files:
          "architecture.rst": {strip_header_lines: 20}
          "conduct.rst": {strip_header_lines: 20}
          "maintenance.rst": {strip_header_lines: 20}
          "nomenclature.rst": {strip_header_lines: 20}
          "practices.rst": {strip_header_lines: 20}
          "practices-rust.rst": {strip_header_lines: 20}
          "requirements.rst": {strip_header_lines: 20}
          "style.rst": {strip_header_lines: 20}
      {%- else %}
      - source: "github:emcd/python-project-common@docs-1#documentation/common"
        files:
          "*.rst": {strip_header_lines: 20}
      {%- endif %}
    when: "{{ provide_instructions }}"
